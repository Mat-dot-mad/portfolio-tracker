<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Quarters — Portfolio Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        .chart-container { position: relative; height: 360px; }
        .card-value { font-size: 1.4rem; font-weight: 700; }
        .card-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--bs-secondary-color); }
        .card-detail { font-size: 0.85rem; color: var(--bs-secondary-color); }
        .card-change { font-size: 0.95rem; font-weight: 600; margin-top: 0.15rem; }
        .text-positive { color: #198754; }
        .text-negative { color: #dc3545; }
        .text-new { color: #0d6efd; }
        .text-sold { color: #6c757d; }
        .badge-ike { background: #198754; }
        .badge-ikem { background: #0d6efd; }
        .badge-ikze { background: #fd7e14; }
        .table .num { text-align: right; font-variant-numeric: tabular-nums; }
        #loading { text-align: center; padding: 4rem 0; }

        .diff-table { font-size: 0.85rem; }
        .diff-table td, .diff-table th { padding: 0.4rem 0.6rem; }
        .diff-table th { cursor: pointer; user-select: none; white-space: nowrap; }
        .diff-table th .sort-arrow { opacity: 0.3; font-size: 0.7rem; }
        .diff-table th.sort-active .sort-arrow { opacity: 1; }

        .section-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0.5rem 0.6rem;
            background: var(--bs-tertiary-bg);
        }

        .group-row { cursor: pointer; }
        .group-row:hover { background: var(--bs-tertiary-bg) !important; }
        .group-row td:first-child::before {
            content: '\25B6';
            display: inline-block;
            font-size: 0.6rem;
            margin-right: 0.4rem;
            transition: transform 0.15s;
        }
        .group-row.expanded td:first-child::before { transform: rotate(90deg); }
        .ticker-row { display: none; }
        .ticker-row.visible { display: table-row; }
        .ticker-row td { background: var(--bs-tertiary-bg); color: var(--bs-secondary-color); }
        .ticker-row td:first-child { padding-left: 1.8rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">Portfolio Tracker</span>
        <div class="d-flex align-items-center gap-2">
            <a href="/" class="btn btn-sm btn-outline-light">Dashboard</a>
            <a href="/compare" class="btn btn-sm btn-outline-light active">Compare</a>
            <button class="btn btn-sm btn-outline-light" id="themeToggle" onclick="toggleTheme()">Dark</button>
        </div>
    </div>
</nav>

<div class="container" id="app">
    <div id="loading">Loading...</div>
</div>

<template id="compare-template">
<div class="container">

    <h4 class="mb-3">Quarterly Comparison</h4>

    <!-- Quarter selectors -->
    <div class="d-flex align-items-center gap-2 mb-4 flex-wrap">
        <label class="form-label mb-0 fw-semibold">Compare</label>
        <select id="selectA" class="form-select form-select-sm" style="width: auto;"></select>
        <span>with</span>
        <select id="selectB" class="form-select form-select-sm" style="width: auto;"></select>
    </div>

    <!-- Summary delta cards -->
    <div class="row g-3 mb-4" id="compare-cards"></div>

    <!-- Diff table -->
    <div class="card mb-4">
        <div class="card-body">
            <h5 class="card-title">Positions Diff</h5>
            <div class="table-responsive">
                <table class="table table-sm table-hover diff-table mb-0">
                    <thead id="diff-head"></thead>
                    <tbody id="diff-body"></tbody>
                    <tfoot class="fw-bold" id="diff-footer"></tfoot>
                </table>
            </div>
        </div>
    </div>

    <!-- Change by Tag (horizontal bar chart) -->
    <div class="card mb-4">
        <div class="card-body">
            <h5 class="card-title">Change by Tag</h5>
            <div class="chart-container">
                <canvas id="tag-delta-chart"></canvas>
            </div>
        </div>
    </div>

    <!-- Net Worth Bridge (waterfall) -->
    <div class="card mb-4">
        <div class="card-body">
            <h5 class="card-title">Net Worth Bridge</h5>
            <div class="text-muted mb-3" id="waterfall-summary" style="font-size: 0.9rem;"></div>
            <div class="chart-container">
                <canvas id="waterfall-chart"></canvas>
            </div>
        </div>
    </div>

</div>
</template>

<script src="{{ url_for('static', filename='compare.js') }}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
